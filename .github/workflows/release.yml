name: Package and release

# Fire whenever you push a version tag, e.g.  git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "**"

# Needed so the packager can create the GitHub release / upload the zip asset.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Full history + tags so the packager can build the changelog and
          # resolve the version from the tag.
          fetch-depth: 0

      - name: Package and release
        uses: BigWigsMods/packager@v2
        env:
          # GITHUB_TOKEN is provided automatically; used to attach the zip to
          # the GitHub release.
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
          # Add these as repository secrets to enable the matching uploads.
          # Each store also needs its ## X-*-ID in the .toc. A target whose
          # secret is empty is silently skipped, so this is safe before secrets
          # are set.
          CF_API_KEY:     ${{ secrets.CF_API_KEY }}       # CurseForge  (X-Curse-Project-ID)
          WOWI_API_TOKEN: ${{ secrets.WOWI_API_TOKEN }}   # WoWInterface (X-WoWI-ID)
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}   # Wago.io     (X-Wago-ID)
